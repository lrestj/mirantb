[window]
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 0.7

[font]
size=14

[font.normal]
family = "HackNerdFont"

[colors.primary]
background = "#000f0f"
#background = "#000000"

[general]
import = [
    "~/.config/alacritty/kitty.toml"
]

[terminal]
shell="fish"

[keyboard]
bindings = [
{ key = "A", mods = "Control|Shift", action = "CreateNewWindow" },
]
