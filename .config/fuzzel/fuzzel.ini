[main]
font=Hack NF Bold:size=14
use-bold=yes
dpi-aware=no
hide-prompt=true
# fields=name,generic,comment,categories,filename,keywords,exec
fields=name,filename
terminal=foot
prompt=""
placeholder="   Hledej... "
icons-enabled=yes
show-actions=yes
anchor=center
x-margin=10
y-margin=10
lines=10
width=45
horizontal-pad=20
vertical-pad=20
inner-pad=5
line-height=35
letter-spacing=0
image-size-ratio=0.4
layer=top
exit-on-keyboard-focus-loss = yes

[colors]
background=2e3440ff
prompt=dcd7baff
input=dcd7baff
text=938aa9ff
match=2e3440ff
selection=76946aff
selection-text=1f1f28ff
border=7e9cd8ff

[border]
width=2
radius=0
